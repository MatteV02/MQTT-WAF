# test/rules/assets/test_default.yaml
version: "1.0"

# Omit the inner policy fields so they parse as NULL and trigger the default "allow" fallbacks
default_policies: {}

rules:
  message:
    - id: "MSG-DEFAULT-01"
      name: "Minimal Message Rule"
      topics:
        - "data/sensors/#"
      # 'action' is omitted to test the fallback to "allow"
      # 'log' and 'invert_match' are omitted to test fallback to false
      # 'payload_regex' is omitted to test NULL fallback

  topic:
    - id: "TOPIC-DEFAULT-01"
      name: "Minimal Topic Rule"
      # 'action' is omitted to test the fallback to "allow"
      # 'client_id_regex' is omitted to test NULL fallback
      # 'permissions' mapping is completely omitted to test 0-count hydration